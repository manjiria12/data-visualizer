<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Structures Visualizer</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="logo">DS</div>
      <h1>Data Structures Visualizer</h1>
    </div>
    <p class="subtitle">// interactive learning tool — stack · queue · sorting</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('stack')">⬆ Stack</button>
    <button class="tab" onclick="showTab('queue')">➡ Queue</button>
    <button class="tab" onclick="showTab('bubble')">⟳ Bubble Sort</button>
    <button class="tab" onclick="showTab('selection')">✦ Selection Sort</button>
  </div>

  <!-- STACK -->
  <div class="panel active" id="panel-stack">
    <div class="card">
      <div class="controls">
        <input type="number" id="stack-val" value="42"/>
        <button onclick="stackPush()">Push</button>
        <button onclick="stackPop()">Pop</button>
        <button onclick="stackReset()">Reset</button>
      </div>
      <div id="stack-visual"></div>
      <div id="stack-ptr"></div>
    </div>
    <div id="stack-step"></div>
  </div>

  <!-- QUEUE -->
  <div class="panel" id="panel-queue">
    <div class="card">
      <div class="controls">
        <input type="number" id="queue-val" value="7"/>
        <button onclick="queueEnqueue()">Enqueue</button>
        <button onclick="queueDequeue()">Dequeue</button>
        <button onclick="queueReset()">Reset</button>
      </div>
      <div id="queue-visual"></div>
      <div id="queue-ptr"></div>
    </div>
    <div id="queue-step"></div>
  </div>

  <!-- BUBBLE SORT -->
  <div class="panel" id="panel-bubble">
    <button onclick="bubbleToggle()">Start</button>
    <button onclick="bubbleReset()">Reset</button>
    <button onclick="bubbleShuffle()">Shuffle</button>
    <div id="bubble-bars"></div>
  </div>

  <!-- SELECTION SORT -->
  <div class="panel" id="panel-selection">
    <button onclick="selToggle()">Start</button>
    <button onclick="selReset()">Reset</button>
    <button onclick="selShuffle()">Shuffle</button>
    <div id="sel-bars"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
