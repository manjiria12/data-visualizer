<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Structures Visualizer</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="logo">DS</div>
      <h1>Data Structures Visualizer</h1>
    </div>
    <p class="subtitle">// interactive learning tool — stack · queue · sorting</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('stack')">⬆ Stack</button>
    <button class="tab" onclick="showTab('queue')">➡ Queue</button>
    <button class="tab" onclick="showTab('bubble')">⟳ Bubble Sort</button>
    <button class="tab" onclick="showTab('selection')">✦ Selection Sort</button>
  </div>

  <!-- STACK -->
  <div class="panel active" id="panel-stack">
    <div class="sec-label">// stack — last in, first out (LIFO)</div>
    <div class="card">
      <div class="controls">
        <input type="number" id="stack-val" value="42" min="0" max="999"/>
        <button class="btn push" onclick="stackPush()">Push ↑</button>
        <button class="btn pop" onclick="stackPop()">Pop ↓</button>
        <button class="btn reset" onclick="stackReset()">Reset</button>
      </div>
      <div id="stack-visual" class="stack-wrap"></div>
      <div class="pointer-row" id="stack-ptr"></div>
    </div>
    <div class="step-box" id="stack-step"></div>
  </div>

  <!-- QUEUE -->
  <div class="panel" id="panel-queue">
    <div class="sec-label">// queue — first in, first out (FIFO)</div>
    <div class="card">
      <div class="controls">
        <input type="number" id="queue-val" value="7" min="0" max="999"/>
        <button class="btn push" onclick="queueEnqueue()">Enqueue →</button>
        <button class="btn pop" onclick="queueDequeue()">Dequeue ←</button>
        <button class="btn reset" onclick="queueReset()">Reset</button>
      </div>
      <div id="queue-visual" class="queue-wrap"></div>
      <div class="pointer-row" id="queue-ptr"></div>
    </div>
    <div class="step-box" id="queue-step"></div>
  </div>

  <!-- BUBBLE SORT -->
  <div class="panel" id="panel-bubble">
    <div class="card">
      <button class="btn play" id="bubble-btn" onclick="bubbleToggle()">▶ Start</button>
      <button class="btn reset" onclick="bubbleReset()">Reset</button>
      <button class="btn" onclick="bubbleShuffle()">Shuffle</button>
      <input type="range" min="1" max="10" value="5" id="bubble-spd"/>
      <div class="bars-area" id="bubble-bars"></div>
    </div>
    <div class="step-box" id="bubble-step"></div>
  </div>

  <!-- SELECTION SORT -->
  <div class="panel" id="panel-selection">
    <div class="card">
      <button class="btn play" id="sel-btn" onclick="selToggle()">▶ Start</button>
      <button class="btn reset" onclick="selReset()">Reset</button>
      <button class="btn" onclick="selShuffle()">Shuffle</button>
      <input type="range" min="1" max="10" value="5" id="sel-spd"/>
      <div class="bars-area" id="sel-bars"></div>
    </div>
    <div class="step-box" id="sel-step"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
